version: '3.8'

services:
  aerospike:
    image: aerospike/aerospike-server:latest
    ports:
      - "3000:3000"
    volumes:
      - aerospike-data:/opt/aerospike/data

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: shieldgate_alerting
      POSTGRES_USER: shieldgate
      POSTGRES_PASSWORD: shieldgate123
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  aerospike-data:
  postgres-data:
